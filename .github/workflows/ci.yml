name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm audit --omit=dev --audit-level=high
      - run: npm run build
      - name: Start production server
        run: npm run start > next-server.log 2>&1 &
      - name: Run route and auth-guard smoke checks
        run: npm run smoke
      - name: Show server log on failure
        if: failure()
        run: cat next-server.log
